<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC Terminal Pro</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="app-header">
        <h1>HC Terminal Pro</h1>
        <span class="badge">v7.0</span>
    </header>

    <nav class="tabs">
        <button class="tab active" data-tab="scanner">Scanner</button>
        <button class="tab" data-tab="rekomendasi">Rekomendasi</button>
        <button class="tab" data-tab="flow">Flow Detector</button>
        <button class="tab" data-tab="jurnal">Jurnal</button>
        <button class="tab" data-tab="events">Events</button>
        <button class="tab" data-tab="telegram">Telegram</button>
    </nav>

    <main class="container">
        <section id="scanner" class="tab-content active">
            <div class="toolbar">
                <select id="scannerSort">
                    <option value="1h">1H</option>
                    <option value="24h">24H</option>
                </select>
                <button id="scanBtn" class="primary">Scan Market</button>
            </div>
            <div id="scannerResult" class="panel">
                <p class="muted">Belum ada data scan. Klik "Scan Market" untuk mulai.</p>
            </div>
        </section>

        <section id="rekomendasi" class="tab-content">
            <div class="panel">
                <p>Rekomendasi akan muncul setelah scan berjalan.</p>
            </div>
        </section>

        <section id="flow" class="tab-content">
            <div class="panel">
                <p>Flow path detection membutuhkan data scan.</p>
            </div>
        </section>

        <section id="jurnal" class="tab-content">
            <div class="panel">
                <form id="journalForm" class="form-grid">
                    <input name="symbol" placeholder="Symbol (misal C98USDT)" required />
                    <input name="entry" type="number" step="any" placeholder="Entry Price" required />
                    <input name="exit" type="number" step="any" placeholder="Exit Price (kosongkan jika open)" />
                    <input name="capital" type="number" step="any" placeholder="Capital ($)" required />
                    <textarea name="notes" placeholder="Catatan"></textarea>
                    <button type="submit" class="primary">Simpan Trade</button>
                </form>
                <div id="journalList" class="list"></div>
            </div>
        </section>

        <section id="events" class="tab-content">
            <div class="panel">
                <p>Calendar event akan dimuat dari CoinMarketCal-like feed.</p>
            </div>
        </section>

        <section id="telegram" class="tab-content">
            <div class="panel">
                <form id="tgForm" class="form-grid">
                    <input name="botToken" placeholder="Bot Token" required />
                    <input name="chatId" placeholder="Chat ID" required />
                    <button type="submit" class="primary">Simpan & Test</button>
                </form>
                <p class="muted">Konfigurasi ini disimpan lokal di browser.</p>
            </div>
        </section>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
